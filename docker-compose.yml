services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lms_platform
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms -d lms_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M

  lms:
    build:
      context: .
      args:
        - NEXT_PUBLIC_SERVER_URL=${NEXT_PUBLIC_SERVER_URL:-https://lms.nadtocheev.ru}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://lms:${DB_PASSWORD:-changeme}@db:5432/lms_platform
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
      - NEXT_PUBLIC_SERVER_URL=${NEXT_PUBLIC_SERVER_URL:-https://lms.mentorcareer.ru}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - EMAIL_FROM_ADDRESS=${EMAIL_FROM_ADDRESS:-noreply@nadtocheev.ru}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-MentorCareer LMS}
    volumes:
      - lms-media:/app/media
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lms.rule=Host(`${LMS_DOMAIN:-lms.nadtocheev.ru}`)"
      - "traefik.http.routers.lms.entrypoints=websecure"
      - "traefik.http.routers.lms.tls.certresolver=letsencrypt"
      - "traefik.http.services.lms.loadbalancer.server.port=3000"

volumes:
  pgdata:
  lms-media:

networks:
  dokploy-network:
    external: true
